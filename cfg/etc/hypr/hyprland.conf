autogenerated = false
monitor = ,preferred,auto,1

$run = flatpak run
$browser = [workspace 3] $run com.brave.Browser
$lock = pidof -q hyprlock || hyprlock -c /etc/hypr/hyprlock.conf
$terminal = ghostty --config-default-files=false --config-file=/etc/config.ghostty
$bar = waybar -l off

env = LC_ALL,C.UTF-8
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland

env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,gtk3
env = HYPRCURSOR_SIZE,24
env = XCURSOR_SIZE,24

env = _JAVA_AWT_WM_NONREPARENTING,1
env = PYTHON_HISTORY,/dev/null
env = GDK_DEBUG,portals
env = GTK_USE_PORTAL,1

env = RADV_PERFTEST,gpl,video_decode,video_encode
env = QSG_RHI_BACKEND,vulkan
env = LD_BIND_NOW,1

ecosystem {
    no_donation_nag = true
}

exec-once = $bar & mako & hypridle -c /etc/hypr/hypridle.conf
exec-once = $terminal
exec-once = wl-clip-persist --clipboard regular

general {
    gaps_in = 2
    gaps_out = 2
    border_size = 1
    col.active_border = rgba(ffdd44ff) rgba(ffdd44ff) 0deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    layout = master
}

master {
    new_status = slave
}

render {
    new_render_scheduling = true
}

animations {
    enabled = 0
}

decoration {
    rounding = 0
    rounding_power = 0.0
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
      enabled = false
    }

    blur {
      enabled = false
    }
}

misc {
    background_color = rgb(16, 16, 16)
    disable_hyprland_logo = true
    enable_anr_dialog = false
}

input {
    kb_layout = en,ru
    kb_options = grp:caps_toggle
    repeat_delay = 200
    repeat_rate = 50
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
      natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

gestures {
    workspace_swipe_distance = 15
}

$mod = SUPER
bind = $mod, RETURN, exec, $terminal
bind = $mod, B, exec, $browser
bind = $mod, D, exec, [workspace 3] $run dev.vencord.Vesktop
bind = $mod, R, exec, [workspace 9] $run com.obsproject.Studio
bind = $mod, T, exec, [workspace 4] $run org.telegram.desktop
bind = $mod, O, exec, $run org.onlyoffice.desktopeditors
bind = $mod, K, exec, $run org.inkscape.Inkscape

bind = $mod, X, forcekillactive,
bind = $mod, C, killactive,
bind = $mod, M, exec, hyprctl dispatch exit
bind = $mod, L, exec, $lock

bind = $mod, SPACE, exec, systemctl suspend; $lock
bind = $mod, Alt_R, exec, systemctl poweroff

bind = $mod SHIFT, Alt_L, exec, grim -l9 -g "$(slurp)"
bind = $mod, Alt_L, exec, grim -l9

bind = Control_R, left, workspace, e-1
bind = Control_R, right, workspace, e+1
bind = Control_R, up, movetoworkspace, e+1
bind = Control_R, down, movetoworkspace, e-1

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bindel = $mod, Q, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 7%-
bindel = $mod, W, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 7%+
bindel = $mod, A, exec, brightnessctl -q -n10 set '5%-'
bindel = $mod, S, exec, brightnessctl -q -n10 set '5%+'

# Switch floating window
bind = $mod, Tab, cyclenext
bind = $mod, Tab, bringactivetotop

# Resize window
bindel = $mod SHIFT, right, resizeactive, 10% 0
bindel = $mod SHIFT, left, resizeactive, -10% 0
bindel = $mod SHIFT, up, resizeactive, 0 -10%
bindel = $mod SHIFT, down, resizeactive, 0 10%

# Move floating window
bindel = $mod CONTROL, up, moveactive, 0 -10%
bindel = $mod CONTROL, left, moveactive, -10% 0
bindel = $mod CONTROL, down, moveactive, 0 10%
bindel = $mod CONTROL, right, moveactive, 10% 0

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = maximize-portal
    match:class = xdg-desktop-portal-gtk
    maximize = true
    float = true
}

windowrule {
    name = maximize-shape-picker
    match:class = hyprland-share-picker
    maximize = true
    float = true
}

windowrule {
    name = maximize-open-dialog
    match:title = ^(Open a different file)$
    maximize = true
    float = true
}

windowrule {
    name = maximize-save-dialog
    match:title = ^(Select file to save to)$
    maximize = true
    float = true
}

debug {
  overlay = false
  full_cm_proto = true
}
